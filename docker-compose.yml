version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8080"
    env_file: .env
    volumes:
      - ./data:/app/data          # ChromaDB persistence
      - ${SPECS_DIR:-/Users/sohel/3gpp_specs_2024_09}:/specs:ro
    environment:
      - SPECS_DIR=/specs
      - CHROMA_DB_PATH=/app/data/chromadb
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
